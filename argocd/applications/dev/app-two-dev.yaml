apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-two-dev
  namespace: argocd
spec:
  project: bi-project

  source:
    repoURL: https://github.com/YOUR_ORG/argocd-two-apps-envs.git
    targetRevision: main
    path: apps/app-two/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
