apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: bi-project
  namespace: argocd
spec:
  description: BI project for dev and prod apps

  sourceRepos:
    - '*'

  destinations:
    - namespace: dev
      server: https://kubernetes.default.svc
    - namespace: prod
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: ''
      kind: Namespace

  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
